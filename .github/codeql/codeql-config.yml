name: MOTO CodeQL configuration

queries:
  - uses: security-and-quality

paths:
  - backend
  - frontend/src
  - tests
  - moto_launcher.py
  - moto_updater.py

paths-ignore:
  - backend/data/**
  - backend/logs/**
  - frontend/node_modules/**
  - frontend/dist/**
  - .moto_instances/**
  - __pycache__/**
  - .pytest_cache/**
